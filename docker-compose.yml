  llama:
    build: ./docker/llama
    container_name: cartoon-llama
    mem_limit: 24g        # ← Оставь 8 ГБ для системы
    memswap_limit: 56g    # ← 24 ГБ ОЗУ + 32 ГБ swap
    ports:
      - "8080:8080"
    volumes:
      - /home/roman/models/Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf:/models/model.gguf:ro
      - ./docker/llama/start.sh:/start.sh
    environment:
      - GGML_VULKAN=1
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    networks:
      - cartoon-net
    entrypoint: /start.sh

  # 🗄️ Qdrant (векторная БД)
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: cartoon-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - cartoon-net

networks:
  cartoon-net:
    driver: bridge

volumes:
  qdrant_data:
    driver: local